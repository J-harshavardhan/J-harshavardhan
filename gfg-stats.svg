name: Update GFG Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  update-gfg-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch GFG stats and generate SVG
        run: python generate_gfg_card.py

      - name: Commit and push updated SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gfg-stats.svg
          git diff --staged --quiet || git commit -m "chore: auto-update GFG stats [skip ci]"
          git push
