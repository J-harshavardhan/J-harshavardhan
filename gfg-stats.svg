<svg width="495" height="210" viewBox="0 0 495 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#282a36;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1f2e;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="495" height="210" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="495" height="210" rx="12" fill="url(#bgGrad)" stroke="#44475a" stroke-width="1"/>

  <!-- Top GFG green accent bar -->
  <rect width="495" height="5" rx="2" fill="#2F8D46" clip-path="url(#rounded)"/>

  <!-- GFG Title -->
  <text x="25" y="34" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2F8D46">GeeksforGeeks</text>
  <text x="168" y="34" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="13" fill="#6272a4"> Stats Card</text>

  <!-- Username -->
  <text x="25" y="53" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="12" fill="#8be9fd">@jharshavardhan</text>

  <!-- Horizontal divider -->
  <line x1="20" y1="63" x2="475" y2="63" stroke="#44475a" stroke-width="1"/>

  <!-- ── LEFT: Donut Circle ── -->
  <!-- circumference = 2 * pi * 56 = 351.86 -->
  <!-- Basic  13/80 = 16.25% = 57.18px -->
  <!-- Easy   28/80 = 35%    = 123.15px -->
  <!-- Medium 33/80 = 41.25% = 145.14px -->
  <!-- Hard    6/80 = 7.5%   = 26.39px -->

  <!-- Background ring -->
  <circle cx="98" cy="138" r="56" fill="none" stroke="#44475a" stroke-width="9"/>
  <!-- Hard (red) -->
  <circle cx="98" cy="138" r="56" fill="none" stroke="#ff5555" stroke-width="9"
          stroke-dasharray="26.39 325.47" stroke-linecap="round"
          transform="rotate(-90 98 138)"/>
  <!-- Medium (orange) -->
  <circle cx="98" cy="138" r="56" fill="none" stroke="#ffb86c" stroke-width="9"
          stroke-dasharray="145.14 206.72" stroke-linecap="round"
          transform="rotate(-90 98 138)"/>
  <!-- Easy (green) -->
  <circle cx="98" cy="138" r="56" fill="none" stroke="#50fa7b" stroke-width="9"
          stroke-dasharray="123.15 228.71" stroke-linecap="round"
          transform="rotate(-90 98 138)"/>
  <!-- Basic (cyan) -->
  <circle cx="98" cy="138" r="56" fill="none" stroke="#8be9fd" stroke-width="9"
          stroke-dasharray="57.18 294.68" stroke-linecap="round"
          transform="rotate(-90 98 138)"/>

  <!-- Center text -->
  <text x="98" y="130" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="30" font-weight="bold" fill="#f8f8f2">80</text>
  <text x="98" y="150" text-anchor="middle" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#6272a4">Solved</text>

  <!-- Vertical divider -->
  <line x1="175" y1="68" x2="175" y2="198" stroke="#44475a" stroke-width="1"/>

  <!-- ── RIGHT: Stats ── -->
  <text x="198" y="87" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#6272a4">Coding Score</text>
  <text x="198" y="106" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="20" font-weight="bold" fill="#50fa7b">207</text>

  <text x="320" y="87" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#6272a4">Institute Rank</text>
  <text x="320" y="106" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffb86c">#10</text>

  <text x="420" y="87" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#6272a4">POTD Streak</text>
  <text x="420" y="106" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff79c6">7 🔥</text>

  <line x1="190" y1="115" x2="478" y2="115" stroke="#44475a" stroke-width="0.8"/>

  <!-- Breakdown bars (max width = 175px) -->
  <!-- Basic 13/80 → 28px -->
  <text x="198" y="131" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#8be9fd">Basic</text>
  <rect x="245" y="122" width="175" height="7" rx="3.5" fill="#383a4a"/>
  <rect x="245" y="122" width="28" height="7" rx="3.5" fill="#8be9fd"/>
  <text x="430" y="131" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#8be9fd">13</text>

  <!-- Easy 28/80 → 61px -->
  <text x="198" y="149" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#50fa7b">Easy</text>
  <rect x="245" y="140" width="175" height="7" rx="3.5" fill="#383a4a"/>
  <rect x="245" y="140" width="61" height="7" rx="3.5" fill="#50fa7b"/>
  <text x="430" y="149" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#50fa7b">28</text>

  <!-- Medium 33/80 → 72px -->
  <text x="198" y="167" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#ffb86c">Medium</text>
  <rect x="245" y="158" width="175" height="7" rx="3.5" fill="#383a4a"/>
  <rect x="245" y="158" width="72" height="7" rx="3.5" fill="#ffb86c"/>
  <text x="430" y="167" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#ffb86c">33</text>

  <!-- Hard 6/80 → 13px -->
  <text x="198" y="185" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#ff5555">Hard</text>
  <rect x="245" y="176" width="175" height="7" rx="3.5" fill="#383a4a"/>
  <rect x="245" y="176" width="13" height="7" rx="3.5" fill="#ff5555"/>
  <text x="430" y="185" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="11" fill="#ff5555">6</text>

  <!-- Footer -->
  <line x1="190" y1="193" x2="478" y2="193" stroke="#44475a" stroke-width="0.8"/>
  <text x="198" y="206" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="10" fill="#6272a4">POTDs Solved: </text>
  <text x="284" y="206" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="10" font-weight="bold" fill="#ff79c6">15</text>
  <text x="310" y="206" font-family="'Segoe UI', Ubuntu, Arial, sans-serif" font-size="10" fill="#6272a4">  ·  82 Submissions in 2026</text>
</svg>