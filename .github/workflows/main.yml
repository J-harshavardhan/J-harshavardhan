
name: 🟢 Update GFG Stats Card

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  update-gfg-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 📦 Install dependencies
        run: pip install requests
      - name: 🔄 Generate GFG stats SVG
        run: python generate_gfg_card.py
      - name: 💾 Commit updated SVG
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gfg-stats.svg
          git diff --staged --quiet || git commit -m "chore: update GFG stats [skip ci]"
          git push
